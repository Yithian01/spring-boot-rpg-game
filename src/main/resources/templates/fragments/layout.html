<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<style th:fragment="commonStyle">
    /* ===== 1. 기초 초기화 ===== */
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* ===== 2. 공통 헤더 및 시스템 UI ===== */
    .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
    }
    .game-logo { font-size: 1.2rem; font-weight: bold; color: #666; margin: 0; letter-spacing: 1px; }
    .btn-home {
        text-decoration: none; background-color: #252525; color: #aaa;
        padding: 6px 12px; border: 1px solid #444; border-radius: 6px;
        font-size: 0.9rem; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .btn-home:hover { background-color: #333; color: #fff; border-color: #666; }

    .system-message {
        position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9); color: #ffd700; padding: 12px 35px;
        border: 1px solid #ffd700; border-radius: 30px; z-index: 9999;
        font-weight: bold; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        animation: slideDownFade 3s forwards; pointer-events: none;
    }

    /* ===== 3. 공통 모달 (게임오버 등) ===== */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 10000;
    }
    .modal-content {
        background: #1a1a1a; border: 3px solid #ff4d4d; border-radius: 12px;
        padding: 30px; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
        animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* ===== 4. 공통 애니메이션 ===== */
    @keyframes slideDownFade { 0% { opacity: 0; top: 10px; } 15% { opacity: 1; top: 30px; } 85% { opacity: 1; top: 30px; } 100% { opacity: 0; top: 20px; } }
    @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes blink { 50% { opacity: 0.6; } }
</style>

<style th:fragment="townStyle">
    * { box-sizing: border-box; }

    body {
        margin: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* ===== 2. 게임 메인 컨테이너 ===== */
    .container {
         /* 1. 고정 너비보다 유연한 너비 사용 (중요) */
        width: 98% !important;
        max-width: 1400px !important; /* 기존 1150px에서 대폭 확장 */

        /* 2. 높이 설정 */
        height: 90vh !important; /* 900px 고정보다 화면 높이에 맞춤 */
        min-height: 800px;

        /* 3. 레이아웃 안정화 */
        margin: 0 auto !important;
        background-color: #1a1a1a;
        border: 1px solid #333;
        box-shadow: 0 0 50px rgba(0,0,0,0.8);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        position: relative;
        overflow: visible !important; /* 내부 요소가 잘리지 않게 함 */
    }

    /* ===== 3. 상단 패널 비율 조정 ===== */
    .top-panel {
        display: grid !important;
        /* 장비창(오른쪽)의 공간을 확실히 확보하기 위해 비율 조정 */
        grid-template-columns: 350px 1fr 380px !important;
        gap: 20px !important;
        flex-grow: 1;
        min-height: 0;
        width: 100% !important;
    }

    /* 장비창 박스가 찌그러지지 않게 최소 너비 보장 */
    .equipment-box {
        min-width: 320px !important;
    }

    /* ===== 3. 상단 패널 ===== */
    .top-panel {
        display: grid;
        /* 스탯(1) : 인벤토리(1.2) : 장비창(0.8) 비율 */
        grid-template-columns: 1fr 1.2fr 0.8fr;
        gap: 15px;
        flex-grow: 1;
        min-height: 0;
    }

    .box {
        background-color: #252525;
        border: 2px solid #3a3a3a;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }


    /* 마을 정보 및 인벤토리 */
    .town-section {
        flex-shrink: 0;
        border-bottom: 1px solid #444;
        padding-bottom: 15px;
        margin-bottom: 15px;
    }
    .box > h2 {
        margin: 0 0 10px 0;
        padding-bottom: 8px;
        border-bottom: 2px solid #444;
        color: #ffaa00;
        font-size: 1.1em;
    }

    .town-info p { margin: 6px 0; color: #ccc; font-size: 0.9em; display: flex; justify-content: space-between;}

    .inventory-list {
        list-style: none; padding: 5px; margin: 0;
        background: #1e1e1e; border: 1px solid #333; border-radius: 4px;
        flex-grow: 1; overflow-y: auto;
    }
    .inventory-item {
        padding: 8px; border-bottom: 1px dashed #333;
        font-size: 0.9em; display: flex; align-items: center; gap: 8px;
    }
    .item-info { display: flex; flex-direction: column; justify-content: center; }
    .item-name { color: #e0e0e0; font-weight: bold; font-size: 0.95em; }
    .item-desc { color: #888; font-size: 0.8em; }

    .tax-paid { color: #4cd137; font-weight: bold; }
    .tax-unpaid { color: #ff4d4d; font-weight: bold; animation: blink 2s infinite; }
    @keyframes blink { 50% { opacity: 0.6; } }


    /* ===== 4. 시스템 메시지 (Toast) ===== */
    .system-message {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #ffd700;
        padding: 12px 35px;
        border: 1px solid #ffd700;
        border-radius: 30px;
        z-index: 9999;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        animation: slideDownFade 3s forwards;
        pointer-events: none;
    }

    @keyframes slideDownFade {
        0% { opacity: 0; top: 10px; }
        15% { opacity: 1; top: 30px; }
        85% { opacity: 1; top: 30px; }
        100% { opacity: 0; top: 20px; }
    }

    /* ===== 5. 게임 오버 모달 스타일 ===== */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); /* 배경 어둡게 */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }

    .modal-content {
        background: #1a1a1a;
        border: 3px solid #ff4d4d;
        border-radius: 12px;
        padding: 30px;
        width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
        animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalPop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .modal-content h2 {
        color: #ff4d4d;
        font-size: 2rem;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
    }

    .modal-content p {
        color: #ccc;
        line-height: 1.5;
        margin-bottom: 25px;
    }

    .modal-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .btn-modal {
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        font-family: inherit;
    }

    .btn-retry { background: #ff4d4d; color: white; }
    .btn-retry:hover { background: #ff3333; transform: scale(1.02); }

    .btn-menu { background: #444; color: #eee; }
    .btn-menu:hover { background: #555; }

    /* ===== 6. 도박 전용 모달 스타일 ===== */
    .gamble-modal-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none; /* 기본 숨김 */
        justify-content: center;
        align-items: center;
        z-index: 9000;
    }

    .gamble-content {
        background: #1e1e1e;
        border: 2px solid #9b59b6; /* 도박 버튼색과 맞춤 */
        border-radius: 12px;
        padding: 25px;
        width: 350px;
        text-align: center;
        box-shadow: 0 0 20px rgba(155, 89, 182, 0.3);
    }

    .gamble-content h2 { color: #9b59b6; margin-top: 0; }

    .bet-input-group {
        margin: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .bet-input-group input {
        background: #111;
        border: 1px solid #444;
        color: #ffd700;
        padding: 10px;
        text-align: center;
        font-size: 1.2rem;
        border-radius: 5px;
    }

    .quick-bet-btns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 5px;
    }

    .btn-quick {
        background: #333;
        border: 1px solid #555;
        color: #ccc;
        padding: 5px;
        font-size: 0.8rem;
        cursor: pointer;
        border-radius: 4px;
    }

    .btn-quick:hover { background: #444; }

    .gamble-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .btn-confirm-gamble { background: #9b59b6; color: white; flex: 2; }
    .btn-cancel-gamble { background: #444; color: #ccc; flex: 1; }


    /* 장비창 내부 정렬 */
    .equipment-box {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .equip-grid {
        display: grid;
        /* 슬롯 크기에 맞춰 그리드 폭 고정 */
        grid-template-columns: repeat(3, 80px);
        gap: 15px;

        /* [추가된 테두리 및 여백 설정] */
        background: #111;           /* 박스 내부 배경색 */
        border: 1px solid #444;    /* 테두리 색상 (로그창과 통일) */
        border-radius: 8px;        /* 모서리 곡률 */
        padding: 20px;             /* 슬롯과 테두리 사이의 사방 여백 */
        margin-top: 20px;          /* 제목과의 간격 */

        /* 박스가 그리드 크기에 딱 맞게 줄어들도록 설정 */
        width: fit-content;
        margin-left: auto;
        margin-right: auto;
    }

    .slot {
        /* 인벤토리 아이콘 크기에 맞춰 80px로 확대 */
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        border: 2px solid #555; /* 슬롯이 커졌으니 테두리도 다시 강조 */
        background: rgba(0, 0, 0, 0.6);
        border-radius: 6px;      /* 크기에 맞춰 곡률도 살짝 증가 */
        overflow: hidden;
        transition: all 0.2s ease-in-out;
    }

    .slot:hover {
        border-color: #ffd700;
        background: rgba(50, 50, 50, 0.8);
        transform: scale(1.05); /* 마우스 올리면 살짝 커지는 효과 */
    }

    /* 슬롯 내부 이미지 */
    .item-icon-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        cursor: pointer;
    }

    /* 빈 슬롯 이모지 크기 확대 */
    .slot > span {
        font-size: 2rem; /* 슬롯이 커졌으니 이모지도 큼직하게 */
    }

    /* 툴팁 스타일 */
    .slot:hover::after {
        content: attr(title);
        position: absolute;
        top: -35px;
        background: #000;
        color: #fff;
        font-size: 0.85rem;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid #ffd700;
        white-space: nowrap;
        z-index: 10;
    }

    .container {
        width: 1150px;
        height: 900px;
    }

    /* 슬롯 내부 자식 요소들을 꽉 채우기 위한 설정 */
    .full-size {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* 해제 버튼 스타일 초기화 */
    .unequip-btn {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
        display: block;
    }

    .unequip-btn:active {
        transform: scale(0.95); /* 클릭했을 때 쏙 들어가는 효과 */
    }

    /* 등급별 테두리 색상 */
    .border-COMMON { border-color: #555 !important; }
    .border-UNCOMMON { border-color: #1eff00 !important; box-shadow: inset 0 0 5px rgba(30, 255, 0, 0.2); }
    .border-RARE { border-color: #0070dd !important; box-shadow: inset 0 0 8px rgba(0, 112, 221, 0.3); }
    .border-EPIC { border-color: #a335ee !important; box-shadow: 0 0 10px rgba(163, 53, 238, 0.5); }
    .border-LEGENDARY { border-color: #ff8000 !important; box-shadow: 0 0 15px rgba(255, 128, 0, 0.7); animation: legendary-glow 2s infinite; }

    /* 등급별 글자 색상 */
    .text-COMMON { color: #eee; }
    .text-UNCOMMON { color: #1eff00; font-weight: bold; }
    .text-RARE { color: #0070dd; font-weight: bold; text-shadow: 0 0 5px rgba(0,112,221,0.5); }
    .text-EPIC { color: #a335ee; font-weight: bold; text-shadow: 0 0 8px rgba(163,53,238,0.6); }
    .text-LEGENDARY { color: #ff8000; font-weight: bold; text-shadow: 0 0 12px rgba(255,128,0,0.8); }

    @keyframes legendary-glow {
        0% { filter: brightness(1); }
        50% { filter: brightness(1.3); }
        100% { filter: brightness(1); }
    }
</style>


<style th:fragment="dungeonStyle">
    .container {
        width: 1600px !important; max-width: 98vw !important;
        height: 95vh !important; display: flex !important;
        flex-direction: column !important; overflow: hidden !important;
        background: #121212; margin: 0 auto;
        border: 1px solid #333; border-radius: 12px; padding: 15px; gap: 10px;
    }
    .top-panel {
        display: flex !important; gap: 15px !important;
        flex: 1 !important; min-height: 0 !important;
        max-height: calc(100% - 210px) !important; /* 액션 패널 확보 */
    }
    /* 던전 전용 컬럼 비율 */
    .dungeon-col-stats { flex: 1.0; min-width: 350px; display: flex; flex-direction: column; }
    .dungeon-col-inv   { flex: 1.8; min-width: 700px; display: flex; flex-direction: column; }
    .dungeon-col-equip { flex: 0.8; min-width: 300px; display: flex; flex-direction: column; }

    .box {
        height: 100% !important; background: rgba(255, 255, 255, 0.05);
        border: 1px solid #444; border-radius: 8px; padding: 15px;
        display: flex; flex-direction: column; overflow: hidden;
    }
</style>
</html>
