<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:fragment="gameLogStyle">
        <style>
            .battle-log-panel {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
                border-top: 1px solid #333;
                margin-top: 15px;
                padding-top: 10px;
                min-height: 200px;
            }

            .battle-log-header {
                color: #ff4d4d; /* 던전용 기본 빨간색 */
                margin: 0 0 10px 0;
                font-size: 1.1rem;
                border-bottom: 1px solid #333;
                padding-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            #battleLogs {
                flex: 1;
                background: #000;
                border: 1px solid #222;
                padding: 10px;
                overflow-y: auto;
                text-align: left;
                font-size: 0.85rem;
                line-height: 1.6;
                border-radius: 4px;
            }

            /* --- 요청하신 커스텀 스크롤바 디자인 적용 --- */
            #battleLogs::-webkit-scrollbar,
            .custom-scroll::-webkit-scrollbar {
                width: 8px;
            }
            #battleLogs::-webkit-scrollbar-track,
            .custom-scroll::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.2);
                border-radius: 4px;
            }
            #battleLogs::-webkit-scrollbar-thumb,
            .custom-scroll::-webkit-scrollbar-thumb {
                background: #444;
                border-radius: 4px;
                border: 1px solid rgba(0, 0, 0, 0.3);
            }
            #battleLogs::-webkit-scrollbar-thumb:hover,
            .custom-scroll::-webkit-scrollbar-thumb:hover {
                background: #555;
            }

            .log-entry {
                margin-bottom: 6px;
                border-bottom: 1px solid #1a1a1a;
                padding-bottom: 4px;
                color: #ccc;
            }

            /* 최신 로그 강조 및 포인트 컬러 */
            .log-entry:first-child {
                color: #fff;
                font-weight: bold;
                border-left: 3px solid #ff4d4d;
                padding-left: 8px;
            }

            .log-empty {
                color: #444;
                text-align: center;
                padding-top: 30px;
                font-style: italic;
            }
        </style>
    </th:block>
</head>
<body>

<div th:fragment="gameLogPanel(logs)" class="battle-log-panel">
    <h2 class="battle-log-header">📜 게임 기록</h2>

    <div id="battleLogs" class="custom-scroll">
        <div th:each="log : ${logs ?: {}}" th:utext="${log}" class="log-entry"></div>

        <div th:if="${#lists.isEmpty(logs)}" class="log-empty">
            아직 기록된 활동이 없습니다...
        </div>
    </div>
</div>

</body>
</html>
