<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style th:fragment="battleLogStyle">
        .battle-log-panel {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            border-top: 1px solid #333;
            margin-top: 15px;
            padding-top: 10px;
        }

        .battle-log-header {
            color: #ff4d4d;
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #battleLogs {
            flex: 1;
            background: #000;
            border: 1px solid #222;
            padding: 10px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
            border-radius: 4px;
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 4px;
            color: #ccc;
        }

        .log-empty {
            color: #444;
            text-align: center;
            padding-top: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div th:fragment="battleLogPanel(logs)" class="battle-log-panel">
    <h2 class="battle-log-header">📜 전투 상세 기록</h2>

    <div id="battleLogs" class="custom-scroll">
        <div th:each="log : ${logs}" th:utext="${log}" class="log-entry"></div>

        <div th:if="${#lists.isEmpty(logs)}" class="log-empty">
            전투의 흔적이 없습니다...
        </div>
    </div>
</div>

</body>
</html>
