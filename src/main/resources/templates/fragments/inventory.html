<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="inventoryStyle">
    <style>
        /* 가방 컨테이너 */
        .inv-list-container {
            height: 100%; display: flex; flex-direction: column;
            min-height: 0; background: #1a1a1a; position: relative;
        }
        .inv-scroll-area { flex: 1; overflow-y: auto; min-height: 0; padding-right: 8px; }
        .inv-ul { list-style: none; padding: 0; margin: 0; }

        /* 아이템 줄 */
        .inv-item-row {
            display: flex; align-items: center; padding: 12px 10px;
            border-bottom: 1px solid #333; gap: 12px; transition: background 0.2s;
        }
        .inv-item-row:hover { background: rgba(255, 255, 255, 0.05); }

        /* 아이콘 박스 */
        .inv-icon-box {
            width: 52px; height: 52px; background: #000; border: 2px solid #444;
            border-radius: 4px; overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; /* 숫자 배지 위치 기준 */
        }
        .inv-icon-box img { width: 100%; height: 100%; object-fit: cover; cursor: help; }

        /* [추가] 아이콘 위 숫자 배지 */
        .inv-qty-badge {
            position: absolute; bottom: 2px; right: 2px;
            background: rgba(0, 0, 0, 0.75); color: #00ff00;
            font-size: 0.7rem; font-weight: bold; padding: 1px 4px;
            border-radius: 3px; border: 1px solid rgba(0, 255, 0, 0.3);
            pointer-events: none; z-index: 5;
        }

        /* 아이템 정보 */
        .inv-item-info { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
        .inv-item-name {
            font-weight: bold; font-size: 0.95rem;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            padding-right: 5px;
        }

        /* 버튼 그룹 */
        .inv-btn-group { display: flex; flex-direction: column; gap: 4px; margin-left: auto; min-width: 65px; }
        .btn-quick {
            width: 100%; padding: 6px 0; font-size: 0.75rem; font-weight: bold;
            border-radius: 4px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); color: #fff;
        }
        form[action*="equip"] .btn-quick { background: linear-gradient(180deg, #3d6a3d 0%, #2a4a2a 100%); }
        form[action*="consume"] .btn-quick { background: linear-gradient(180deg, #3a5a8a 0%, #2a3a5a 100%); }
        form[action*="sell"] .btn-quick { background: linear-gradient(180deg, #8a3a3a 0%, #5a2a2a 100%); }

        /* 등급별 색상 */
        .text-COMMON { color: #eee; }
        .text-UNCOMMON { color: #1eff00; }
        .text-RARE { color: #0070dd; }
        .text-EPIC { color: #a335ee; }
        .text-LEGENDARY { color: #ff8000; text-shadow: 0 0 8px rgba(255,128,0,0.5); }

        .border-COMMON { border-color: #555 !important; }
        .border-UNCOMMON { border-color: #1eff00 !important; }
        .border-RARE { border-color: #0070dd !important; }
        .border-EPIC { border-color: #a335ee !important; }
        .border-LEGENDARY { border-color: #ff8000 !important; box-shadow: 0 0 10px rgba(255,128,0,0.3); }

        /* 고사양 툴팁 스타일 */
        #item-tooltip {
            position: fixed; display: none; z-index: 10000;
            width: 320px; /* 기존 280px에서 320px로 확장 */
            background: rgba(10, 10, 10, 0.98); /* 좀 더 깊은 배경색 */
            border: 2px solid #555; border-radius: 8px; padding: 18px;
            pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            font-family: 'Pretendard', sans-serif;
        }

        .tt-header {
            display: flex;
            flex-direction: column; /* 이름과 타입을 위아래로 배치하여 공간 확보 */
            gap: 4px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        .tt-name {
            font-size: 1.25rem; /* 폰트 살짝 키움 */
            font-weight: bold;
            line-height: 1.3;
            word-break: keep-all; /* 단어 단위 줄바꿈으로 가독성 향상 */
            overflow-wrap: break-word; /* 필요시 강제 줄바꿈 */
        }

        .tt-type {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: normal;
        }
        .tt-desc { color: #bbb; font-size: 0.85rem; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; font-style: italic; }
        .tt-stats { color: #ffd700; font-size: 0.9rem; padding-top: 8px; border-top: 1px dashed #333; }
        .tt-stat-row { margin-bottom: 3px; }
    </style>
</th:block>

<div th:fragment="inventoryList(items, mode)" class="inv-list-container">

    <div id="item-tooltip">
        <div class="tt-header">
            <div id="tt-name" class="tt-name">아이템 이름</div>
            <div id="tt-type" class="tt-type">부위</div>
        </div>
        <div id="tt-desc" class="tt-desc">설명이 여기에 표시됩니다.</div>
        <div id="tt-stats" class="tt-stats"></div>
    </div>

    <div class="inv-scroll-area custom-scroll">
        <ul class="inv-ul">
            <li th:if="${#lists.isEmpty(items)}" style="padding:40px; text-align:center; color:#555;">가방이 비어있습니다.</li>
            <li th:each="item : ${items}" class="inv-item-row">

                <div class="inv-icon-box" th:classappend="${'border-' + item.grade}">
                    <img th:src="${item.icon}"
                         onmouseover="showTooltip(this)"
                         onmousemove="moveTooltip(event)"
                         onmouseout="hideTooltip()"
                         th:data-name="${item.name}"
                         th:data-grade="${item.grade}"
                         th:data-type="${item.subType != null ? item.subType : item.type}"
                         th:data-desc="${item.description}"
                         th:data-bonuses="${#strings.listJoin(item.statBonuses, '|')}"
                         th:data-recovery="${item.recoveryEffect}"
                         th:data-quantity="${item.quantity}"> <span th:if="${item.quantity > 1}" class="inv-qty-badge" th:text="${item.quantity}"></span>
                </div>

                <div class="inv-item-info">
                    <span class="inv-item-name" th:classappend="${'text-' + item.grade}">
                        <span th:text="${item.name}"></span>
                    </span>
                    <small style="color: #ffd700; font-size: 0.75rem;"
                           th:text="${#strings.listJoin(item.statBonuses, ', ')}"></small>
                </div>

                <div class="inv-btn-group">
                    <form th:if="${item.slot != null and item.slot != 'NONE'}" action="/inventory/equip" method="post">
                        <input type="hidden" name="itemId" th:value="${item.id}">
                        <input type="hidden" name="slot" th:value="${item.slot}">
                        <button type="submit" class="btn-quick">장착</button>
                    </form>
                    <form th:if="${item.type == 'CONSUMABLE'}" action="/inventory/consume" method="post">
                        <input type="hidden" name="itemId" th:value="${item.id}">
                        <button type="submit" class="btn-quick">사용</button>
                    </form>
                    <form th:if="${mode != 1}" action="/inventory/sell" method="post" onsubmit="return confirm('판매하시겠습니까?');">
                        <input type="hidden" name="itemId" th:value="${item.id}">
                        <button type="submit" class="btn-quick">판매</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>

    <script th:inline="javascript">
        function showTooltip(el) {
            const tooltip = document.getElementById('item-tooltip');
            const data = {
                name: el.getAttribute('data-name'),
                grade: el.getAttribute('data-grade'),
                type: el.getAttribute('data-type'),
                desc: el.getAttribute('data-desc'),
                bonuses: el.getAttribute('data-bonuses'),
                recovery: el.getAttribute('data-recovery'),
                quantity: parseInt(el.getAttribute('data-quantity') || "1")
            };

            const nameEl = document.getElementById('tt-name');

            // 수량 표시를 좀 더 강조 (예: [3개] 아이템 이름)
            const displayName = data.quantity > 1 ? `<span style="color:#00ff00;">[${data.quantity}개]</span> ${data.name}` : data.name;

            nameEl.innerHTML = displayName; // innerText 대신 innerHTML 사용
            nameEl.className = 'tt-name text-' + data.grade;

            // 타입 표시 (예: "장비 - 한손검")
            document.getElementById('tt-type').innerText = "분류: " + data.type;
            document.getElementById('tt-desc').innerText = data.desc || "특별한 설명이 없는 아이템입니다.";

            /* 스탯 및 회복 로직 동일... */
            let statsHtml = "";
            if (data.bonuses) {
                data.bonuses.split('|').forEach(s => {
                    if(s.trim()) statsHtml += `<div class="tt-stat-row">• ${s.trim()}</div>`;
                });
            }
            if (data.recovery && data.recovery !== 'null') {
                statsHtml += `<div class="tt-stat-row" style="color:#00ff00;">• ${data.recovery}</div>`;
            }
            document.getElementById('tt-stats').innerHTML = statsHtml;

            tooltip.style.display = 'block';
            tooltip.style.borderColor = getGradeColor(data.grade);
        }

        function moveTooltip(e) {
            const tooltip = document.getElementById('item-tooltip');
            const padding = 20;

            let x = e.clientX + padding;
            let y = e.clientY + padding;

            if (x + 300 > window.innerWidth) x = e.clientX - 300;
            if (y + tooltip.offsetHeight > window.innerHeight) y = window.innerHeight - tooltip.offsetHeight - 10;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            document.getElementById('item-tooltip').style.display = 'none';
        }

        function getGradeColor(grade) {
            const colors = { 'COMMON': '#555', 'UNCOMMON': '#1eff00', 'RARE': '#0070dd', 'EPIC': '#a335ee', 'LEGENDARY': '#ff8000' };
            return colors[grade] || '#444';
        }
    </script>
</div>
</html>
