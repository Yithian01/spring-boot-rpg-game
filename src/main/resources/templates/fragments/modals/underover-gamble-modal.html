<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="underOverStyle">
    <style>
        .uo-modal-content {
            background: #1a1a1c;
            border: 2px solid #f39c12;
            border-radius: 24px;
            padding: 30px;
            width: 600px;
            text-align: center;
            box-shadow: 0 0 60px rgba(243, 156, 18, 0.3);
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* 상단 상태바 */
        .uo-status-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .status-box {
            background: #000;
            padding: 15px;
            border-radius: 14px;
            border: 1px solid #333;
        }
        .status-label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
        .status-value { font-size: 1.25rem; font-weight: 800; color: #fff; }

        /* 베팅 입력 섹션 */
        .bet-input-wrapper {
            background: #252527;
            border: 2px solid #444;
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .bet-input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffd700;
            padding: 18px;
            font-size: 1.8rem;
            text-align: center;
            outline: none;
            font-weight: 900;
        }

        .bet-ctrl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        .ctrl-btn {
            background: #333;
            color: #eee;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { background: #444; border-color: #666; }
        .ctrl-btn.special { background: #34495e; color: #fff; }
        .ctrl-btn.danger { color: #ff7675; border-color: #ff7675; }

        /* 주사위 영역 */
        .dice-area-wrapper { position: relative; margin-bottom: 20px; }
        .dice-area {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .dice-box {
            width: 85px; height: 85px;
            background: #fdfdfd;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            color: #111;
            box-shadow: 0 8px 0 #bbb, 0 10px 20px rgba(0,0,0,0.5);
        }

        /* 결과 애니메이션 */
        .result-overlay-mini {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            z-index: 10;
            pointer-events: none;
            animation: stampIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .stamp-mini {
            padding: 10px 30px;
            font-size: 3rem;
            font-weight: 900;
            border: 8px double;
            border-radius: 14px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .s-win { color: #2ecc71; border-color: #2ecc71; text-shadow: 0 0 15px rgba(46,204,113,0.6); }
        .s-lose { color: #e74c3c; border-color: #e74c3c; text-shadow: 0 0 15px rgba(231,76,60,0.6); }

        /* [수정됨] 결과 메시지 컨테이너 - 좌측 정렬 */
        .result-msg-container {
            background: rgba(0,0,0,0.5);
            padding: 18px 25px; /* 좌측 패딩 살짝 더 줌 */
            border-radius: 15px;
            border: 1px solid #444;
            border-left: 5px solid #f39c12; /* 좌측 강조선으로 변경 */
            margin-bottom: 25px;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* 좌측 정렬 */
            gap: 12px;
            text-align: left; /* 텍스트 자체도 좌측 정렬 */
        }
        .msg-text {
            color: #ffd700;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
        }
        .detail-info-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            width: 100%;
            justify-content: flex-start; /* 알약들도 왼쪽부터 */
        }
        .info-pill {
            background: #222;
            padding: 5px 12px;
            border-radius: 8px; /* 조금 더 각진 세련된 느낌 */
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pill-label { color: #888; font-size: 0.8rem; }
        .pill-value { font-weight: 700; color: #fff; }
        .calc-formula { color: #f39c12; font-family: 'Courier New', monospace; font-weight: bold; }

        /* 선택 버튼 */
        .choice-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .choice-btn {
            background: #2a2a2d;
            border: 2px solid #444;
            border-radius: 14px;
            padding: 18px 5px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .choice-btn:hover { border-color: #f39c12; background: #333; transform: translateY(-3px); }
        .c-label { font-weight: 800; font-size: 1.2rem; }
        .c-mult { font-size: 0.95rem; color: #ffd700; font-weight: bold; }

        @keyframes stampIn {
            0% { transform: translate(-50%, -50%) rotate(-15deg) scale(3); opacity: 0; }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); opacity: 1; }
        }

        .btn-exit-bottom {
            display: inline-block;
            padding: 12px 40px;
            background: #222;
            border: 2px solid #444;
            border-radius: 50px;
            color: #eee;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-exit-bottom:hover {
            color: #fff;
            border-color: #ff7675;
            background: #e74c3c;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</th:block>

<div th:fragment="underOverModal(gamble, town)" id="underOverModal" class="gamble-modal-overlay" style="display: flex;">
    <div class="uo-modal-content">

        <div class="uo-status-row">
            <div class="status-box">
                <span class="status-label">보유 자산</span>
                <span class="status-value" th:text="${#numbers.formatInteger(gamble.currentGold, 0, 'COMMA')} + ' G'"></span>
            </div>
            <div class="status-box">
                <span class="status-label" th:text="${gamble.step == 'RESULT' ? '이전 판 결과' : '대기 상태'}"></span>
                <span class="status-value"
                      th:style="${gamble.step == 'RESULT' ? (gamble.earnedGold >= 0 ? 'color:#2ecc71;' : 'color:#e74c3c;') : 'color:#fff;'}"
                      th:text="${(gamble.earnedGold > 0 ? '+' : '') + #numbers.formatInteger(gamble.step == 'RESULT' ? gamble.earnedGold : 0, 0, 'COMMA')} + ' G'">
                </span>
            </div>
        </div>

        <div class="bet-input-wrapper">
            <input type="number" id="bettingAmount" th:min="10" th:max="${gamble.currentGold}" th:value="${gamble.betAmount != 0 ? #numbers.formatInteger(gamble.betAmount, 0) : 100}">
        </div>
        <div class="bet-ctrl-grid">
            <button type="button" class="ctrl-btn" onclick="stepAmount(-100)">- 100</button>
            <button type="button" class="ctrl-btn" onclick="stepAmount(100)">+ 100</button>
            <button type="button" class="ctrl-btn special" onclick="setHalf()">HALF</button>
            <button type="button" class="ctrl-btn danger" onclick="setAllIn()">ALL-IN</button>
        </div>

        <div class="dice-area-wrapper" th:with="dices=${ { '?', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅' } }">
            <div th:if="${gamble.step == 'RESULT'}" class="result-overlay-mini">
                <div th:classappend="${gamble.isWin} ? 's-win' : 's-lose'" class="stamp-mini">
                    <span th:text="${gamble.isWin ? 'WINNER' : 'LOSE'}"></span>
                </div>
            </div>
            <div class="dice-area">
                <div class="dice-box" th:text="${gamble.step == 'RESULT' ? dices[gamble.diceResults[0]] : '⚅'}"></div>
                <div class="dice-box" th:text="${gamble.step == 'RESULT' ? dices[gamble.diceResults[1]] : '⚅'}"></div>
            </div>
        </div>

        <div class="result-msg-container" th:with="dices=${ { '?', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅' } }">
            <div class="msg-text" th:text="${gamble.step == 'RESULT' ? gamble.resultMessage : '주사위를 굴릴 준비가 되셨나요?'}"></div>

            <div class="detail-info-row" th:if="${gamble.step == 'RESULT'}">
                <div class="info-pill">
                    <span class="pill-label">USER CHOICE</span>
                    <span class="pill-value"
                          th:style="${gamble.userChoice == 'UNDER' ? 'color:#3498db' : (gamble.userChoice == 'OVER' ? 'color:#2ecc71' : 'color:#e74c3c')}"
                          th:text="${gamble.userChoice}"></span>
                </div>

                <div class="info-pill">
                    <span class="pill-label">RESULT</span>
                    <span class="calc-formula">
                        <th:block th:text="${dices[gamble.diceResults[0]]} + ' ' + ${gamble.diceResults[0]}"></th:block>
                        +
                        <th:block th:text="${dices[gamble.diceResults[1]]} + ' ' + ${gamble.diceResults[1]}"></th:block>
                        =
                        <span style="color:#fff;" th:text="${gamble.diceSum}"></span>
                    </span>
                </div>
            </div>
        </div>

        <form action="/gamble/under-over/play" method="post" class="choice-row"
              th:with="rawBonus=${town.gambleOption.bonusDividendRate}, bonusAdd=${rawBonus / 100.0}">
            <input type="hidden" name="batAmount" id="finalAmount">

            <button type="submit" name="userChoice" value="UNDER" class="choice-btn" onclick="syncAmt()">
                <span class="c-label" style="color:#3498db;">UNDER</span>
                <span style="font-size:0.75rem; color:#999;">2 ~ 6 (x<th:block th:text="${#numbers.formatDecimal(2.0 + bonusAdd, 1, 1)}"></th:block>)</span>
            </button>
            <button type="submit" name="userChoice" value="SEVEN" class="choice-btn" onclick="syncAmt()">
                <span class="c-label" style="color:#e74c3c;">SEVEN</span>
                <span style="font-size:0.75rem; color:#999;">LUCKY 7 (x<th:block th:text="${#numbers.formatDecimal(5.0 + bonusAdd, 1, 1)}"></th:block>)</span>
            </button>
            <button type="submit" name="userChoice" value="OVER" class="choice-btn" onclick="syncAmt()">
                <span class="c-label" style="color:#2ecc71;">OVER</span>
                <span style="font-size:0.75rem; color:#999;">8 ~ 12 (x<th:block th:text="${#numbers.formatDecimal(2.0 + bonusAdd, 1, 1)}"></th:block>)</span>
            </button>
        </form>

        <a href="/town/gamble/close" class="btn-exit-bottom">🚪 그만하고 나가기</a>
    </div>

    <script th:inline="javascript">
        const maxGold = [[${gamble.currentGold}]];
        function setBet(amount) {
            const input = document.getElementById('bettingAmount');
            let target = Math.floor(amount);
            if (target > maxGold) target = maxGold;
            if (target < 10) target = 10;
            input.value = target;
        }
        function stepAmount(step) {
            const input = document.getElementById('bettingAmount');
            setBet(parseInt(input.value || 0) + step);
        }
        function setHalf() {
            const input = document.getElementById('bettingAmount');
            setBet(parseInt(input.value || 0) / 2);
        }
        function setAllIn() { setBet(maxGold); }
        function syncAmt() {
            document.getElementById('finalAmount').value = document.getElementById('bettingAmount').value;
        }
    </script>
</div>
</html>
