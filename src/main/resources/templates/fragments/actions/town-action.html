<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="townActionStyle">
    <style>
        /* [기본 레이아웃 및 버튼 스타일은 유지] */
        .town-action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 80px);
            gap: 10px; padding: 15px;
            background: rgba(30, 30, 30, 0.6);
            border-radius: 12px; border: 1px solid #444;
            flex-shrink: 0;
        }

        .action-btn {
            width: 100%; height: 80px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; background: #2a2a2a; color: #fff;
            border: 1px solid #444; border-radius: 8px;
            font-size: 0.95rem; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            position: relative; overflow: hidden;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }

        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 6px 0 rgba(0,0,0,0.3); }
        .action-btn:active { transform: translateY(2px); box-shadow: 0 0 0 rgba(0,0,0,0.3); }
        .action-btn span:first-child { font-size: 1.5rem; }

        /* 색상 테마 */
        .btn-tax { background: #57606f; border-bottom: 4px solid #2f3542; }
        .btn-work { background: #e67e22; border-bottom: 4px solid #a35200; }
        .btn-gamble { background: #9b59b6; border-bottom: 4px solid #6c3483; }
        .btn-train { background: #3498db; border-bottom: 4px solid #2471a3; }
        .btn-rest { background: #2ecc71; border-bottom: 4px solid #1e8449; }
        .btn-dungeon { background: linear-gradient(135deg, #c0392b, #8e44ad); border: 1px solid #e74c3c; border-bottom: 4px solid #7b241c; }

        /* --- 비밀 상자 가로 배치 수정 스타일 --- */
        .btn-shop {
            background: #d35400 !important;
            border-bottom: 4px solid #873600 !important;
        }

        /* 가로로 나열될 컨테이너 */
        .shop-content-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px; /* 비밀상자 글자와 가격 사이 간격 */
            width: 100%;
        }

        /* 가격표 배경을 더 어둡게 해서 노란색 숫자가 돋보이게 함 */
        .price-tag {
            background: rgba(0, 0, 0, 0.7) !important; /* 투명도를 낮춰 더 검게 변경 */
            padding: 2px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1); /* 미세한 테두리로 구분감 추가 */
        }

        /* 숫자를 쨍한 노란색으로 변경하고 외곽선 추가 */
        .gold-text {
            font-size: 0.85rem !important; /* 크기 살짝 키움 */
            color: #fff200 !important;    /* 더 밝고 선명한 노란색 */
            font-weight: 900 !important;   /* 가장 두꺼운 두께 */
            /* 검은색 외곽선을 사방으로 둘러서 글자를 띄움 */
            text-shadow:
                -1px -1px 0 #000,
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000 !important;
            letter-spacing: 0.5px; /* 글자 간격 살짝 넓혀서 가독성 확보 */
        }

        /* 할인율 텍스트 보강 */
        .discount-text {
            font-size: 0.7rem !important;
            color: #ff4d4d !important; /* 조금 더 쨍한 레드 */
            font-weight: 800 !important;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8) !important;
        }

        .btn-empty { background: #1e1e1e; border: 1px dashed #444; opacity: 0.5; pointer-events: none; }
    </style>
</th:block>

<div th:fragment="actionPanel(gameData)" class="town-action-grid">
    <form action="/town/tax" method="post" style="display:contents;">
        <button type="submit" class="action-btn btn-tax"><span>📜</span>세금 납부</button>
    </form>
    <form action="/town/work" method="post" style="display:contents;">
        <button type="submit" class="action-btn btn-work"><span>⛏️</span>노동 하기</button>
    </form>
    <button type="button" class="action-btn btn-gamble" onclick="openGamble()"><span>🎲</span>도박장</button>
    <button type="button" class="action-btn btn-train" onclick="openTrain()"><span>🧘</span>수련 하기</button>
    <form action="/town/rest" method="post" style="display:contents;">
        <button type="submit" class="action-btn btn-rest"><span>🛌</span>휴식 하기</button>
    </form>
    <form action="/dungeon/enter" method="post" style="display:contents;">
        <button type="submit" class="action-btn btn-dungeon"><span>⚔️</span>던전 입장</button>
    </form>

    <form action="/inventory/gamble-item" method="post" style="display:contents;"
          th:onsubmit="|return confirm('${gameData.boxPrice}골드를 지불하고 비밀 상자를 여시겠습니까?')|">
        <button type="submit" class="action-btn btn-shop">
            <span>🎁</span>
            <div class="shop-content-row">
                <span style="font-size: 0.9rem;">비밀 상자</span>
                <div class="price-tag">
                    <span class="gold-text" th:text="${gameData.boxPrice} + 'G'"></span>
                    <small th:if="${gameData.boxDiscount > 0}"
                           class="discount-text"
                           th:text="'-' + ${gameData.boxDiscount} + '%'">
                    </small>
                </div>
            </div>
        </button>
    </form>

    <button type="button" class="action-btn btn-empty"></button>
    <button type="button" class="action-btn btn-empty"></button>
</div>

</html>
