<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<style th:fragment="commonStyle">
    /* ===== 1. 기초 초기화 & 바디 ===== */
    * { box-sizing: border-box; }
    body {
        margin: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* ===== 2. 공통 헤더 및 시스템 UI ===== */
    .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 10px;
        border-bottom: 1px solid #333;
        flex-shrink: 0;
    }
    .game-logo { font-size: 1.2rem; font-weight: bold; color: #666; margin: 0; letter-spacing: 1px; }
    .btn-home {
        text-decoration: none; background-color: #252525; color: #aaa;
        padding: 6px 12px; border: 1px solid #444; border-radius: 6px;
        font-size: 0.9rem; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
    }
    .btn-home:hover { background-color: #333; color: #fff; border-color: #666; }

    /* ===== 2. 시스템 메시지 (Toast) ===== */
    .system-message {
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.9);
        color: #ffd700;
        padding: 12px 35px;
        border: 1px solid #ffd700;
        border-radius: 30px;
        z-index: 9999;
        font-weight: bold;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        animation: slideDownFade 3s forwards;
        pointer-events: none;
    }

    /* ===== 3. 공통 모달 베이스 (게임 오버 등) ===== */
    .modal-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }

    .modal-content {
        background: #1a1a1a;
        border: 3px solid #ff4d4d;
        border-radius: 12px;
        padding: 30px;
        width: 400px;
        text-align: center;
        box-shadow: 0 0 30px rgba(255, 77, 77, 0.4);
        animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-content h2 {
        color: #ff4d4d;
        font-size: 2rem;
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
    }

    .modal-content p {
        color: #ccc;
        line-height: 1.5;
        margin-bottom: 25px;
    }

    .modal-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* 모달 버튼 공통 */
    .btn-modal {
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.2s;
        font-family: inherit;
    }
    .btn-retry { background: #ff4d4d; color: white; }
    .btn-retry:hover { background: #ff3333; transform: scale(1.02); }
    .btn-menu { background: #444; color: #eee; }
    .btn-menu:hover { background: #555; }

    /* ===== 4. 공통 애니메이션 ===== */
    @keyframes slideDownFade {
        0% { opacity: 0; top: 10px; }
        15% { opacity: 1; top: 30px; }
        85% { opacity: 1; top: 30px; }
        100% { opacity: 0; top: 20px; }
    }
    @keyframes modalPop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
    @keyframes blink { 50% { opacity: 0.6; } }
</style>

<style th:fragment="townStyle">
    * { box-sizing: border-box; }

    body {
        margin: 0;
        background-color: #121212;
        color: #e0e0e0;
        font-family: "Pretendard", "Malgun Gothic", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    /* ===== 2. 게임 메인 컨테이너 ===== */
    .container {
         /* 1. 고정 너비보다 유연한 너비 사용 (중요) */
        width: 1600px !important;
        max-width: 98vw !important;

        /* 2. 높이 설정 */
        height: 92vh !important; /* 900px 고정보다 화면 높이에 맞춤 */
        min-height: 800px;

        /* 3. 레이아웃 안정화 */
        margin: 0 auto !important;
        background-color: #1a1a1a;
        border: 1px solid #333;
        box-shadow: 0 0 50px rgba(0,0,0,0.8);
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        position: relative;
        overflow: visible !important; /* 내부 요소가 잘리지 않게 함 */
    }

    /* ===== 3. 상단 패널 비율 조정 (4컬럼 체제) ===== */
    .top-panel {
        display: grid !important;
        /* 기존: 300px 1fr 1.1fr 350px
           변경: 스탯창을 400px 이상으로 늘리고 나머지도 조절
        */
        grid-template-columns: 420px 1.2fr 1.5fr 400px !important;
        gap: 20px !important;
        flex-grow: 1;
        min-height: 0;
        width: 100% !important;
    }

    /* 각 섹션별 박스 강조 색상 */
    .col-info h2 { color: #4a90e2 !important; border-bottom: 2px solid #4a90e2 !important; }
    .col-inv h2 { color: #ffd700 !important; border-bottom: 2px solid #ffd700 !important; }

    .box {
        background-color: #252525;
        border: 2px solid #3a3a3a;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        height: 100%;
    }

    .box > h2 {
        margin: 0 0 12px 0;
        padding-bottom: 8px;
        font-size: 1.1em;
        display: flex;
        align-items: center;
        gap: 8px;
    }



</style>

<style th:fragment="dungeonStyle">
    .container {
        width: 1850px !important;
        max-width: 98vw !important;
        height: 95vh !important;
        display: flex !important;
        flex-direction: column !important;
        overflow: hidden !important;
        background: #121212;
        margin: 0 auto;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 15px;
        gap: 10px;
    }
    .top-panel {
        display: flex !important;
        gap: 15px !important;
        flex: 1 !important;
        min-height: 0 !important;
        max-height: calc(100% - 210px) !important;
    }
    .dungeon-col-stats {
        flex: 0 0 420px !important;
        display: flex;
        flex-direction: column;
    }
    .dungeon-col-status-effects {
        flex: 0 0 260px !important;
    }

    .dungeon-col-inv {
        flex: 1 !important;
        min-width: 700px;
        display: flex;
        flex-direction: column;
    }

    .dungeon-col-equip {
        flex: 0 0 380px !important;
        display: flex;
        flex-direction: column;
    }

    .box {
        height: 100% !important;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #444;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
</style>
</html>
