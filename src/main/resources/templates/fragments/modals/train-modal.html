<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="trainStyle">
    <style>
        /* [1] 수련 모달 전용 컨텐츠 (기존 .modal-content 확장) */
        .train-modal-content {
            background: #0d0d0d;
            border: 2px solid #d4af37; /* 수련은 특별하게 금색 테두리 */
            border-radius: 12px;
            padding: 30px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* [2] 수련 버튼 그룹 */
        .train-btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        /* [3] 개별 수련 항목 버튼 (공통 .btn-modal 베이스 활용) */
        .btn-train-select {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 15px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            width: 100%;
        }

        .btn-train-select:hover {
            background: #252525;
            border-color: #d4af37;
            transform: translateX(8px);
            box-shadow: -5px 0 15px rgba(212, 175, 55, 0.1);
        }

        /* [4] 텍스트 스타일링 */
        .train-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #efefef;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .train-desc {
            font-size: 0.82rem;
            color: #ccc;
            font-weight: 400;
            line-height: 1.4;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }

        /* [5] 계통별 포인트 컬러 (왼쪽 선) */
        .line-body { border-left: 4px solid #a52a2a; } /* 육신 */
        .line-agi  { border-left: 4px solid #2e7d32; } /* 기민 */
        .line-int  { border-left: 4px solid #1565c0; } /* 정신 */
        .line-sen  { border-left: 4px solid #f57f17; } /* 감각 */
    </style>
</th:block>

<div th:fragment="trainModal" id="trainModal" class="modal-overlay" style="display:none;">
    <div class="train-modal-content">
        <h2 style="color: #d4af37; margin: 0; font-family: 'serif';">🌌 영혼 단련</h2>
        <p style="font-size: 0.85rem; color: #777; margin-top: 10px;">어느 계통의 한계를 돌파하시겠습니까?</p>

        <form action="/town/train" method="post">
            <div class="train-btn-group">
                <button type="submit" name="type" value="육신" class="btn-train-select line-body">
                    <span class="train-title">🛡️ 강철의 가호 (Steel Aegis)</span>
                    <span class="train-desc">최대 HP / 물리 방어력 / 근력 계열 강화</span>
                </button>

                <button type="submit" name="type" value="기민" class="btn-train-select line-agi">
                    <span class="train-title">⚡ 유영하는 그림자 (Shadow Step)</span>
                    <span class="train-desc">회피율 / 치명타 확률 / 신속함 강화</span>
                </button>

                <button type="submit" name="type" value="정신" class="btn-train-select line-int">
                    <span class="train-title">📖 에테르의 조율 (Mana Attunement)</span>
                    <span class="train-desc">최대 MP / 마법 공격 및 저항 / 마력 강화</span>
                </button>

                <button type="submit" name="type" value="감각" class="btn-train-select line-sen">
                    <span class="train-title">👁️ 심안의 개방 (Mind's Eye)</span>
                    <span class="train-desc">명중률 / 살기 감지 / 통찰력 계열 강화</span>
                </button>
            </div>

            <button type="button" class="btn-modal btn-menu" onclick="closeTrain()" style="width: 100%;">
                의식을 중단하고 돌아가기
            </button>
        </form>
    </div>
</div>
</html>
