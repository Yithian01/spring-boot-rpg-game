<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="blackJackStyle">
    <style>
        .bj-modal-content {
            background: #1a1a1c;
            border: 2px solid #8e44ad;
            border-radius: 24px;
            padding: 30px;
            width: 600px;
            text-align: center;
            box-shadow: 0 0 60px rgba(142, 68, 173, 0.3);
            color: white;
            position: relative;
        }

        /* 상태 헤더 */
        .bj-status-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .bj-status-box {
            background: #000;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .bj-status-label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 4px; }
        .bj-status-value { font-size: 1rem; font-weight: 800; color: #fff; }

        /* [추가] 배당률 정보 구역 */
        .bj-multiplier-info {
            background: rgba(142, 68, 173, 0.1);
            border: 1px dashed #8e44ad;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .multiplier-item { display: flex; flex-direction: column; gap: 2px; }
        .mult-label { font-size: 0.7rem; color: #bbb; text-transform: uppercase; }
        .mult-value { font-size: 1.1rem; font-weight: 900; color: #ffd700; }
        .bonus-tag {
            font-size: 0.65rem;
            background: #27ae60;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }

        /* 카드 구역 */
        .card-zone {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 140px;
        }
        .card-label {
            font-size: 0.8rem;
            color: #8e44ad;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }
        .hand-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .card {
            width: 60px;
            height: 85px;
            background: white;
            border-radius: 6px;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 2px solid #ddd;
        }
        .card.back {
            background: linear-gradient(135deg, #2c3e50 25%, #34495e 25%, #34495e 50%, #2c3e50 50%, #2c3e50 75%, #34495e 75%);
            background-size: 10px 10px;
        }

        /* 액션 버튼 */
        .bj-action-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-bj {
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-hit { background: #3498db; color: white; }
        .btn-stay { background: #e67e22; color: white; }
        .btn-deal { background: #8e44ad; color: white; grid-column: span 2; }
        .btn-bj:disabled { background: #333; color: #666; cursor: not-allowed; transform: none !important; }
        .btn-bj:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); }

        .disabled-overlay {
            pointer-events: none;
            opacity: 0.5;
            filter: grayscale(0.8);
        }

        .bj-result-msg {
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffd700;
            min-height: 1.5rem;
        }

        /* 버튼 레이아웃 수정 */
        .bj-action-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 2fr에서 3fr로 변경 */
            gap: 10px;
            margin-top: 20px;
        }
        .btn-double {
            background: #f1c40f;
            color: #000;
        }
        /* 기존 deal 버튼은 3칸을 다 차지하도록 수정 */
        .btn-deal {
            background: #8e44ad;
            color: white;
            grid-column: span 3;
        }

        /* 커스텀 컨펌 모달 스타일 */
        .bj-confirm-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* 기본은 숨김 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .bj-confirm-box {
            text-align: center;
            padding: 20px;
        }
        .confirm-title { color: #e74c3c; font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        .confirm-desc { color: #ddd; margin-bottom: 25px; line-height: 1.5; }
        .confirm-btns { display: flex; gap: 15px; justify-content: center; }
        .btn-warn { background: #e74c3c; color: white; padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #555; color: white; padding: 10px 25px; border-radius: 8px; border: none; cursor: pointer; }
    </style>
</th:block>

<div th:fragment="blackJackModal(gamble, town)" id="blackJackModal" class="gamble-modal-overlay" style="display: flex;">
    <div class="bj-modal-content">

        <div class="bj-status-row">
            <div class="bj-status-box">
                <span class="bj-status-label">나의 자산</span>
                <span class="bj-status-value" th:text="${#numbers.formatInteger(gamble.currentGold, 0, 'COMMA')} + ' G'"></span>
            </div>
            <div class="bj-status-box">
                <span class="bj-status-label">게임 상태</span>
                <span class="bj-status-value" th:text="${gamble.step == 'BET' ? '배팅 중' : (gamble.step == 'PLAYING' ? '게임 중' : '결과 확인')}"></span>
            </div>
            <div class="bj-status-box">
                <span class="bj-status-label">확정 배팅액</span>
                <span class="bj-status-value" style="color: #ffd700;" th:text="${#numbers.formatInteger(gamble.betAmount, 0, 'COMMA')} + ' G'"></span>
            </div>
        </div>

        <div class="bj-multiplier-info">
            <div class="multiplier-item">
                <span class="mult-label">Normal Win</span>
                <span class="mult-value">
                    <span th:text="${2.0 + (town.gambleOption.bonusDividendRate / 100.0)} + 'x'"></span>
                    <span class="bonus-tag" th:if="${town.gambleOption.bonusDividendRate > 0}"
                          th:text="'+' + ${town.gambleOption.bonusDividendRate} + '% Bonus'"></span>
                </span>
            </div>
            <div style="width: 1px; height: 30px; background: #444;"></div>
            <div class="multiplier-item">
                <span class="mult-label">BlackJack (21)</span>
                <span class="mult-value" style="color: #00ffcc;"
                      th:text="${2.5 + (town.gambleOption.bonusDividendRate / 100.0)} + 'x'">
                </span>
            </div>
        </div>

        <div th:classappend="${gamble.step != 'BET'} ? 'disabled-overlay' : ''">
            <div class="bet-input-wrapper">
                <input type="number" id="bjBettingAmount"
                       th:value="${gamble.betAmount > 0 ? #numbers.formatInteger(gamble.betAmount, 0) : 100}"
                       th:readonly="${gamble.step != 'BET'}">
            </div>
            <div class="bet-ctrl-grid">
                <button type="button" class="ctrl-btn" onclick="stepAmountBJ(-100)">- 100</button>
                <button type="button" class="ctrl-btn" onclick="stepAmountBJ(100)">+ 100</button>
                <button type="button" class="ctrl-btn special" onclick="setHalfBJ()">HALF</button>
                <button type="button" class="ctrl-btn danger" onclick="setAllInBJ()">ALL-IN</button>
            </div>
        </div>

        <div class="card-zone">
            <span class="card-label">Dealer <span th:text="'(' + ${gamble.dealerTotal} + ')'"></span></span>
            <div class="hand-display">
                <th:block th:each="card, iter : ${gamble.dealerHand}">
                    <div class="card" th:text="${(gamble.step == 'PLAYING' and iter.index > 0) ? '?' : card}"
                         th:classappend="${(gamble.step == 'PLAYING' and iter.index > 0)} ? 'back' : ''"></div>
                </th:block>
                <div th:if="${#lists.isEmpty(gamble.dealerHand)}" class="card back"></div>
            </div>
        </div>

        <div class="card-zone">
            <span class="card-label">Player <span th:if="${!#lists.isEmpty(gamble.playerHand)}" th:text="'(' + ${gamble.playerTotal} + ')'"></span></span>
            <div class="hand-display">
                <div class="card" th:each="card : ${gamble.playerHand}" th:text="${card}"></div>
                <div th:if="${#lists.isEmpty(gamble.playerHand)}" class="card back"></div>
            </div>
        </div>

        <div class="bj-result-msg" th:text="${gamble.resultMessage}"></div>

        <div class="bj-action-row">
            <form th:if="${gamble.step == 'BET'}" action="/gamble/blackjack/deal" method="post" style="display:contents;">
                <input type="hidden" name="amount" id="bjFinalAmount">
                <button type="submit" class="btn-bj btn-deal" onclick="syncAmountBJ()">카드 받기 (게임 시작)</button>
            </form>

            <th:block th:if="${gamble.step == 'PLAYING'}">
                <form action="/gamble/blackjack/hit" method="post" style="display:contents;">
                    <button type="submit" class="btn-bj btn-hit" th:disabled="${gamble.playerTotal >= 21}">HIT</button>
                </form>

                <form action="/gamble/blackjack/double" method="post" style="display:contents;">
                    <button type="submit" class="btn-bj btn-double"
                            th:disabled="${gamble.playerTotal >= 21 || gamble.currentGold < gamble.betAmount}">DOUBLE</button>
                </form>

                <form action="/gamble/blackjack/stay" method="post" style="display:contents;">
                    <button type="submit" class="btn-bj btn-stay">STAY</button>
                </form>
            </th:block>

            <form th:if="${gamble.step == 'RESULT'}" action="/gamble/start" method="post" style="display:contents;">
                <input type="hidden" name="gameType" value="BLACKJACK">
                <button type="submit" class="btn-bj btn-deal">다시 한 판!</button>
            </form>
        </div>

        <div style="margin-top: 25px;">
            <a href="javascript:void(0);" class="btn-exit-bottom" onclick="confirmExitBJ()">🚪 그만하고 나가기</a>
        </div>

        <div id="bjExitConfirm" class="bj-confirm-overlay">
            <div class="bj-confirm-box">
                <div class="confirm-title">⚠️ 경고: 탈주 발생</div>
                <div class="confirm-desc">
                    현재 판돈이 걸린 게임이 진행 중입니다.<br>
                    지금 나가면 <strong style="color: #ffd700;">배팅 금액을 모두 잃게 됩니다.</strong><br>
                    정말로 이 차가운 도박장을 떠나시겠습니까?
                </div>
                <div class="confirm-btns">
                    <button class="btn-warn" onclick="location.href='/town/gamble/close'">네, 포기합니다</button>
                    <button class="btn-cancel" onclick="hideExitConfirm()">아니오, 계속합니다</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const currentStep = [[${gamble.step}]];
        const maxGoldBJ = [[${gamble.currentGold}]];

        function confirmExitBJ() {
            if (currentStep === 'PLAYING') {
                // 브라우저 confirm 대신 커스텀 레이어 표시
                document.getElementById('bjExitConfirm').style.display = 'flex';
            } else {
                location.href = "/town/gamble/close";
            }
        }

        // 커스텀 모달 닫기
        function hideExitConfirm() {
            document.getElementById('bjExitConfirm').style.display = 'none';
        }

        function syncAmountBJ() {
            document.getElementById('bjFinalAmount').value = document.getElementById('bjBettingAmount').value;
        }

        function setBetBJ(amount) {
            const input = document.getElementById('bjBettingAmount');
            let target = Math.floor(amount);
            if (target > maxGoldBJ) target = maxGoldBJ;
            if (target < 10) target = 10;
            input.value = target;
        }
        function stepAmountBJ(step) { setBetBJ(parseInt(document.getElementById('bjBettingAmount').value || 0) + step); }
        function setHalfBJ() { setBetBJ(parseInt(document.getElementById('bjBettingAmount').value || 0) / 2); }
        function setAllInBJ() { setBetBJ(maxGoldBJ); }
    </script>
</div>
</html>
