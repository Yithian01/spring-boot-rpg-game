<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="shopSelectStyle">
    <style>
        .shop-modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center;
            backdrop-filter: blur(4px);
        }
        .shop-modal-content {
            background:#1e1e1e; padding:25px; border-radius:15px; border:2px solid #d35400;
            width:350px; box-shadow: 0 0 20px rgba(211, 84, 0, 0.3);
        }
        .shop-list { display:flex; flex-direction:column; gap:12px; margin-top: 20px; }

        /* 상점별 고유 색상 */
        .btn-shop-weapon { background:#4b4b4b !important; border-bottom:4px solid #2d3436 !important; }
        .btn-shop-armor { background:#2c3e50 !important; border-bottom:4px solid #1a252f !important; }
        .btn-shop-magic { background:#8e44ad !important; border-bottom:4px solid #5b2c6f !important; }
        .btn-shop-herbs { background:#27ae60 !important; border-bottom:4px solid #1e8449 !important; }
        .btn-shop-black { background:#2d3436 !important; border: 1px solid #c0392b !important; border-bottom:4px solid #000 !important; }
    </style>
</th:block>

<th:block th:fragment="shopSelectModal">
    <div id="shopSelectorModal" class="shop-modal-overlay">
        <div class="shop-modal-content">
            <h3 style="color:#fff; text-align:center; margin:0;">
                <span style="color:#e67e22;">🏪</span> 마을 상점가
            </h3>

            <div class="shop-list">
                <button class="action-btn btn-shop-weapon" onclick="location.href='/shop/open?npcId=WEAPON_MASTER_IRON'">
                    <span>⚔️</span> 아이언의 무기점
                </button>

                <button class="action-btn btn-shop-armor" onclick="location.href='/shop/open?npcId=ARMORER_SILVA'">
                    <span>🛡️</span> 실바의 방어구점
                </button>

                <button class="action-btn btn-shop-magic" onclick="location.href='/shop/open?npcId=MAGE_ELARA'">
                    <span>🔮</span> 엘라라의 마법상점
                </button>

                <button class="action-btn btn-shop-herbs" onclick="location.href='/shop/open?npcId=HIPPIE_LUNA'">
                    <span>🌙</span> 루나의 장신구점
                </button>

                <button class="action-btn btn-shop-black" onclick="location.href='/shop/open?npcId=BLACK_MARKET_JACK'">
                    <span style="filter: grayscale(1);">💀</span> 잭의 암시장
                </button>

                <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;">

                <button type="button" onclick="closeShopSelector()"
                        style="background:none; border:none; color:#999; cursor:pointer; font-size: 0.9rem;">
                    [ 돌아가기 ]
                </button>
            </div>
        </div>
    </div>

    <script>
        function openShopSelector() { document.getElementById('shopSelectorModal').style.display = 'flex'; }
        function closeShopSelector() { document.getElementById('shopSelectorModal').style.display = 'none'; }

        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") closeShopSelector();
        });
    </script>
</th:block>

</html>
