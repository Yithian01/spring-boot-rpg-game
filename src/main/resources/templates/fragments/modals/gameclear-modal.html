<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="gameClearModal(isClear)" th:if="${isClear}" class="modal-overlay">
        <div class="modal-content" style="border-color: #ffd700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);">

            <h2 style="color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">🏆 CLEAR</h2>

            <p>모든 시련을 극복하셨습니다!<br>
                당신의 이름은 전설로 기록될 것입니다.</p>

            <div class="modal-actions">
                <button class="btn-modal"
                        style="background: #ffd700; color: #000;"
                        onclick="location.href='/game/character-select'">새로운 삶 시작</button>

                <button class="btn-modal btn-menu"
                        onclick="location.href='/game/'">타이틀로</button>
            </div>
        </div>
    </div>
</div>
