<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="extractPrepareStyle">
        <style>
            /* [공통 모달 베이스] */
            .extract-modal, .confirm-modal {
                display: none; position: fixed;
                left: 0; top: 0; width: 100%; height: 100%;
                align-items: center; justify-content: center;
            }

            /* 1차 모달 배경 (어둡게) */
            .extract-modal { z-index: 1000; background-color: rgba(0,0,0,0.8); }

            /* 2차 모달 배경 (더 어둡게 하여 1차를 덮음) */
            .confirm-modal { z-index: 1100; background-color: rgba(0,0,0,0.85); }

            .extract-content, .confirm-content {
                background: #1e1e1e; border: 2px solid #006266; width: 450px;
                padding: 25px; border-radius: 15px; position: relative;
                box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
                box-sizing: border-box;
            }

            /* 2차 확인창 스타일 */
            .confirm-content {
                width: 340px; text-align: center; border-color: #e67e22;
                box-shadow: 0 0 30px rgba(230, 126, 34, 0.2);
            }

            .modal-title {
                text-align: center; color: #00fa9a; margin: 0 0 20px 0;
                font-size: 1.4rem;
            }

            /* 마석 그리드 */
            .stone-grid {
                display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
                padding: 10px 5px; max-height: 300px; overflow-y: auto;
                box-sizing: border-box;
            }

            .stone-grid::-webkit-scrollbar { width: 6px; }
            .stone-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

            /* 카드 스타일 */
            .stone-card {
                background: #2a2a2a; border: 1px solid #444; padding: 12px;
                border-radius: 8px; cursor: pointer; transition: all 0.2s;
                display: flex; flex-direction: column; align-items: center;
                box-sizing: border-box;
            }

            .stone-card:hover {
                border-color: #00fa9a; background: #333;
                transform: translateY(-3px);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            }

            .stone-name { font-weight: bold; font-size: 0.9rem; color: #eee; margin-top: 5px; }
            .stone-grade { font-size: 0.75rem; color: #00fa9a; }

            /* 버튼 */
            .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
            .base-btn {
                flex: 1; padding: 12px; border: none; border-radius: 8px;
                font-weight: bold; cursor: pointer; transition: 0.2s; color: white;
            }
            .close-btn { background: #444; }
            .confirm-btn { background: #006266; border-bottom: 3px solid #004d40; }
            .confirm-btn:hover { background: #00fa9a; color: #000; }
            .cancel-btn { background: #c0392b; }

            #confirmMessage { color: #eee; margin: 20px 0; line-height: 1.6; }
            .highlight { color: #00fa9a; font-weight: bold; }
        </style>
    </th:block>

    <div th:fragment="extractPrepareModal(town)" id="extractModal" class="extract-modal">
        <div class="extract-content">
            <h2 class="modal-title">연성할 마석 선택</h2>
            <div class="stone-grid">
                <div th:each="stone : ${town.magicStoneList}"
                     class="stone-card"
                     th:data-instance-id="${stone.instanceId}"
                     th:data-name="${stone.customName}"
                     onclick="openConfirmModal(this)">
                    <span style="font-size: 1.5rem;">💎</span>
                    <span class="stone-name" th:text="${stone.customName}">마석 이름</span>
                    <span class="stone-grade" th:text="${stone.grade} + '등급'">0등급</span>
                    <span style="font-size: 0.8rem; color: #ffd700;" th:text="'보유: ' + ${stone.quantity} + '개'">0개</span>
                </div>
            </div>
            <button type="button" onclick="closeExtractModal()" class="base-btn close-btn" style="width:100%; margin-top:15px;">닫기</button>
        </div>

        <div id="confirmModal" class="confirm-modal">
            <div class="confirm-content">
                <h3 style="color: #e67e22; margin-top: 0;">연성 확인</h3>
                <p id="confirmMessage">이 마석을 연성하시겠습니까?</p>
                <div class="modal-btns">
                    <button type="button" id="finalConfirmBtn" class="base-btn confirm-btn">연성하기</button>
                    <button type="button" onclick="closeConfirmModal()" class="base-btn cancel-btn">취소</button>
                </div>
            </div>
        </div>
    </div>
</html>
