<div th:fragment="townInventory(town, items)" class="box">
    <h2>마을 정보</h2>
    <div class="town-section">
        <div class="town-info">
            <p><span>📅 날짜</span><span style="color:#fff;" th:text="${town.day} + '일차'"></span></p>
            <p><span>⏳ 턴</span><span style="color:#fff;" th:text="${town.currentTurn} + ' / ' + ${town.maxTurn}"></span></p>
            <p><span>💰 세금</span><span style="color:#ffd700;" th:text="${town.currentTax} + ' G'"></span></p>
            <p><span>📜 상태</span>
                <span th:if="${town.isTaxPaid}" class="tax-paid">납부 완료</span>
                <span th:unless="${town.isTaxPaid}" class="tax-unpaid">미납</span>
            </p>
        </div>
    </div>
    <h2>소지품</h2>
    <ul class="inventory-list">
        <li th:if="${#lists.isEmpty(items)}" style="padding:20px; text-align:center; color:#555;">가방이 비어있습니다.</li>
        <li th:each="item : ${items}" class="inventory-item" style="display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333;">

            <div class="item-icon-wrapper" th:classappend="${item.grade != null ? 'border-' + item.grade : ''}"
                 style="width: 50px; height: 50px; margin-right: 12px; background: #1a1a1a; border: 2px solid #444; border-radius: 4px; overflow: hidden; flex-shrink: 0;">
                <img th:src="${item.icon}" style="width: 100%; height: 100%; object-fit: cover;"
                     onmouseover="showItemDescription(this)" onmouseout="clearDescription()"
                     th:data-name="${item.name}" th:data-grade="${item.grade}" th:data-subtype="${item.subType}"
                     th:data-bonuses="${#strings.listJoin(item.statBonuses, ', ')}">
            </div>

            <div class="item-info" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
                <span class="item-name" th:classappend="${item.grade != null ? 'text-' + item.grade : ''}" style="font-weight: bold; white-space: nowrap; text-overflow: ellipsis;">
                    <span th:text="${item.name}"></span>
                    <span th:if="${item.quantity > 1}" style="color: #00ff00; font-size: 0.9em;" th:text="' x' + ${item.quantity}"></span>
                    <small style="color: #aaa; font-weight: normal; margin-left: 4px;" th:text="'[' + ${item.subType} + ']'"></small>
                </span>
                <small style="color: #ffd700;" th:text="${#strings.listJoin(item.statBonuses, ', ')}"></small>
            </div>

            <div class="item-btns" style="display: flex; gap: 4px; flex-shrink: 0;">
                <form th:if="${item.slot != null and item.slot != 'NONE'}" action="/inventory/equip" method="post" style="margin: 0;">
                    <input type="hidden" name="itemId" th:value="${item.id}">
                    <input type="hidden" name="slot" th:value="${item.slot}">
                    <button type="submit" class="btn-quick" style="background: #2a4a2a; border: 1px solid #4a6a4a; color: #fff;">장착</button>
                </form>

                <form th:if="${item.type == 'CONSUMABLE'}" action="/inventory/consume" method="post" style="margin: 0;">
                    <input type="hidden" name="itemId" th:value="${item.id}">
                    <button type="submit" class="btn-quick" style="background: #2a3a5a; border: 1px solid #4a5a7a; color: #fff;">사용</button>
                </form>

                <form action="/inventory/sell" method="post" style="margin: 0;" onsubmit="return confirm('정말로 판매하시겠습니까?');">
                    <input type="hidden" name="itemId" th:value="${item.id}">
                    <button type="submit" class="btn-quick" style="background: #5a2a2a; border: 1px solid #7a3a3a; color: #fff;">판매</button>
                </form>
            </div>
        </li>
    </ul>
</div>

<div th:fragment="dungeonInventory(dungeon)" class="dungeon-info-wrapper" style="display: flex; flex-direction: column; gap: 12px; height: 100%;">

    <div class="box-sub progress-section" style="background: #1a1a1a; padding: 12px; border-radius: 6px; border: 1px solid #333;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
            <span style="color: #fff; font-weight: bold; font-size: 1rem;">
                <i class="floor-icon" style="color: #ff4d4d;">🍃</i> [[${dungeon.currentFloor}]] 층
            </span>
            <span style="color: #51cf66; font-family: monospace; font-weight: bold;" th:text="${dungeon.progress} + '%'"></span>
        </div>
        <div style="width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; border: 1px solid #444;">
            <div th:style="'width:' + ${dungeon.progress} + '%; height:100%; background: linear-gradient(90deg, #2b8a3e, #51cf66); transition: width 0.3s;'"></div>
        </div>
    </div>

    <div class="monster-card"
         th:style="${dungeon.isInBattle ? 'background: linear-gradient(180deg, rgba(40, 0, 0, 0.6) 0%, rgba(10, 10, 10, 0.9) 100%);' : 'background: #111;'} + ' border: 1px solid #444; border-radius: 8px; flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; min-height: 380px;'">

        <div th:if="${dungeon.isInBattle and dungeon.activeMonster != null}" style="display: flex; flex-direction: column; height: 100%; z-index: 1;">

            <div style="position: relative; width: 100%; height: 200px; overflow: hidden; background: #000; border-bottom: 1px solid #444;">
                <img th:src="@{'/images/monsters/' + ${dungeon.activeMonster.monsterId} + '.png'}"
                     style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: transform 0.5s;"
                     onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'"/>

                <div style="position: absolute; top: 10px; left: 10px; display: flex; gap: 5px;">
                    <span style="background: #c0392b; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 2px; font-weight: bold; letter-spacing: 1px;">[[${dungeon.activeMonster.tier}]] GRADE</span>
                </div>

                <div style="position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%); padding: 20px 15px 10px;">
                    <h2 style="color: #ff4d4d; font-size: 1.4rem; margin: 0; text-shadow: 2px 2px 4px #000;" th:text="${dungeon.activeMonster.name}"></h2>
                </div>
            </div>

            <div style="padding: 15px; display: flex; flex-direction: column; gap: 12px; flex: 1;">
                <div style="width: 100%;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem; font-family: monospace;">
                        <span style="color: #ff8787;">VITALITY</span>
                        <span style="color: #fff;" th:text="${dungeon.activeMonster.currentHp} + ' / ' + ${dungeon.activeMonster.maxHp}"></span>
                    </div>
                    <div style="width: 100%; height: 12px; background: #222; border-radius: 2px; border: 1px solid #444; overflow: hidden; box-shadow: inset 0 0 5px #000;">
                        <div th:style="'width:' + (${dungeon.activeMonster.currentHp} * 100 / ${dungeon.activeMonster.maxHp}) + '%; height:100%; background: linear-gradient(90deg, #5c0000, #ff0000); transition: width 0.4s ease-out;'"></div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 4px; border: 1px solid #333;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">물리공격</span>
                        <span style="color: #ff8787;" th:text="${dungeon.activeMonster.stats.meleeAtk}"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">마법공격</span>
                        <span style="color: #da77f2;" th:text="${dungeon.activeMonster.stats.magicAtk}"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">물리방어</span>
                        <span style="color: #74c0fc;" th:text="${dungeon.activeMonster.stats.physDef}"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">마법저항</span>
                        <span style="color: #91a7ff;" th:text="${dungeon.activeMonster.stats.magRes}"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">회피율</span>
                        <span style="color: #63e6be;" th:text="${dungeon.activeMonster.stats.dodge} + '%'"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">치명타</span>
                        <span style="color: #ffd43b;" th:text="${dungeon.activeMonster.stats.critRate} + '%'"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span style="color: #888;">상태저항</span>
                        <span style="color: #ffd43b;" th:text="${dungeon.activeMonster.stats.statusResist} + '%'"></span>
                    </div>
                </div>

                <div style="margin-top: auto; padding-top: 10px; border-top: 1px dashed #444;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="color: #ff9f43; font-size: 0.75rem; font-weight: bold; letter-spacing: 1px;">PLAYER ACTION</span>
                        <div style="display: flex; gap: 4px;">
                            <th:block th:if="${dungeon.playerMaxTurns > 0}"
                                      th:each="i : ${#numbers.sequence(1, dungeon.playerMaxTurns)}">
                                <div th:style="'width: 10px; height: 10px; border-radius: 50%; border: 1px solid #ff9f43; ' + (${i <= dungeon.playerRemainingTurns} ? 'background: #ff9f43; box-shadow: 0 0 5px #ff9f43;' : 'background: transparent;')"></div>
                            </th:block>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:unless="${dungeon.isInBattle}" style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px;">
            <div class="search-pulse" style="width: 80px; height: 80px; border: 2px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; color: #444; font-size: 2rem;">
                <i class="fas fa-eye-slash"></i>
            </div>
            <p style="margin: 0; color: #666; font-size: 0.95rem; font-style: italic; letter-spacing: 0.5px;">수색 중... 적의 기운을 감지하고 있습니다.</p>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div style="background: #111; padding: 10px; border: 1px solid #333; border-radius: 6px; text-align: center; position: relative;">
            <div style="font-size: 0.65rem; color: #888; margin-bottom: 4px;">REWARD EXP</div>
            <div style="color: #d6aaff; font-weight: bold; font-size: 1.1rem;" th:text="'+ ' + ${dungeon.pendingExp}"></div>
            <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #a335ee;"></div>
        </div>
        <div style="background: #111; padding: 10px; border: 1px solid #333; border-radius: 6px; text-align: center; position: relative;">
            <div style="font-size: 0.65rem; color: #888; margin-bottom: 4px;">REWARD GOLD</div>
            <div style="color: #ffd700; font-weight: bold; font-size: 1.1rem;" th:text="'+ ' + ${dungeon.pendingGold}"></div>
            <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #ffd700;"></div>
        </div>
    </div>
</div>
