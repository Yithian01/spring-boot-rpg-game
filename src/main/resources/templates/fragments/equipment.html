<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="equipmentStyle">
    <style>
        /* 모든 관련 요소에 box-sizing 적용 (테두리가 밖으로 나가는 것 방지) */
        .equip-grid, .slot, .slot *, .unequip-btn {
            box-sizing: border-box !important;
        }

        /* 장비창 컨테이너 */
        .equip-grid {
            display: grid !important;
            grid-template-columns: repeat(3, 80px) !important;
            grid-template-rows: repeat(3, 80px) !important;
            gap: 12px !important;
            background: #111;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 16px; /* 여유 공간을 1px 늘림 */
            width: fit-content;
            margin: 10px auto;
            overflow: visible !important; /* 내부 테두리가 짤리지 않게 허용 */
        }

        /* 개별 슬롯 */
        .slot {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #333; /* 기본 테두리 */
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s;
            overflow: hidden; /* 슬롯 내부 이미지가 튀어나오지 않게 함 */
        }

        /* 폼 레이아웃 초기화 (가장 흔한 범인) */
        .slot form {
            display: block;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .slot:hover { border-color: #ffd700 !important; background: #222; }
        .slot.empty { border: 2px solid transparent !important; background: transparent !important; }

        /* 아이템 이미지 */
        .item-icon-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        /* 해제 버튼 레이아웃 초기화 */
        .unequip-btn {
            display: block;
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* [중요] 등급별 테두리 강제 적용 */
        .border-COMMON { border: 2px solid #555 !important; }
        .border-UNCOMMON { border: 2px solid #1eff00 !important; }
        .border-RARE { border: 2px solid #0070dd !important; }
        .border-EPIC { border: 2px solid #a335ee !important; }
        .border-LEGENDARY {
            border: 2px solid #ff8000 !important;
            box-shadow: inset 0 0 5px #ff8000, 0 0 8px #ff8000;
        }

        /* 빈 슬롯 이모지 */
        .slot > span { font-size: 1.8rem; opacity: 0.3; pointer-events: none; }
    </style>
</th:block>
<div th:fragment="equipmentGrid(equippedItems)" class="equip-grid">
    <th:block th:with="slotMap=${ {
        '0':'NECKLACE', '1':'HEAD', '2':'RING',
        '3':'WEAPON',   '4':'BODY', '5':'SUB_WEAPON',
        '6':'GLOVES',    '7':'BOOTS','8':'ARTIFACT'
    } },
    icons=${ {
        'NECKLACE':'📿', 'HEAD':'👑', 'RING':'💍',
        'WEAPON':'⚔️',   'BODY':'👕', 'SUB_WEAPON':'🛡️',
        'BOOTS':'👞',    'GLOVES':'🧤', 'ARTIFACT':'💎'
    } }">

        <div th:each="i : ${#numbers.sequence(0, 8)}"
             class="slot"
             th:classappend="${slotMap['' + i] != 'EMPTY' && equippedItems[slotMap['' + i]] != null ? 'border-' + equippedItems[slotMap['' + i]].grade : (slotMap['' + i] == 'EMPTY' ? 'empty' : '')}">

            <div th:if="${slotMap['' + i] != 'EMPTY' && equippedItems[slotMap['' + i]] != null}" class="full-size">
                <form action="/inventory/unequip" method="post" style="width:100%; height:100%;">
                    <input type="hidden" name="slot" th:value="${slotMap['' + i]}">
                    <button type="submit" class="unequip-btn"
                            onmouseover="showTooltip(this)"
                            onmousemove="moveTooltip(event)"
                            onmouseout="hideTooltip()"

                            th:data-name="${equippedItems[slotMap['' + i]].name}"
                            th:data-grade="${equippedItems[slotMap['' + i]].grade}"
                            th:data-type="${equippedItems[slotMap['' + i]].subType != null ? equippedItems[slotMap['' + i]].subType : equippedItems[slotMap['' + i]].type}"
                            th:data-slot="${slotMap['' + i]}"
                            th:data-desc="${equippedItems[slotMap['' + i]].description}"
                            th:data-bonuses="${#strings.listJoin(equippedItems[slotMap['' + i]].statBonuses, '|')}"
                            th:data-recovery="${equippedItems[slotMap['' + i]].recoveryEffect}"
                            th:data-quantity="1"
                            th:data-gold="${equippedItems[slotMap['' + i]].gold}">
                        <img th:src="${equippedItems[slotMap['' + i]].icon}" class="item-icon-img">
                    </button>
                </form>
            </div>

            <span th:if="${slotMap['' + i] != 'EMPTY' && equippedItems[slotMap['' + i]] == null}"
                  th:text="${icons[slotMap['' + i]]}"></span>
        </div>
    </th:block>
</div>
</html>
